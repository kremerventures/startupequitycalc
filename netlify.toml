# Netlify configuration for startupequitycalc (PWA)
# Static site, no build step — publish the repo root as-is.

[build]
  publish = "."
  command = ""

# --- Cache-Control headers ---
# The service worker, HTML, and manifest must NOT be long-cached, or users can
# get stuck on a stale service worker and never see updates. Icons are content-
# addressed by filename and safe to cache aggressively.

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
